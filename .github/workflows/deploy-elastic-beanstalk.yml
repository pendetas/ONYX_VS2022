name: Deploy ONYX to Elastic Beanstalk

on:
  push:
    branches:
    - main
  workflow_dispatch:
  

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build and deploy ONYX
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up NuGet
        uses: NuGet/setup-nuget@v2

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore ONYX_DDAC.sln

      - name: Create IIS deployment package
        shell: pwsh
        run: |
          msbuild ONYX_DDAC.csproj `
            /t:Package `
            /p:Configuration=Release `
            '/p:DeployIisAppPath=Default Web Site' `
            /p:PackageAsSingleFile=true

          if (-not (Test-Path 'obj\\Release\\Package\\ONYX_DDAC.zip')) {
            throw 'The IIS deployment package was not created.'
          }

      - name: Configure AWS credentials through GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ap-southeast-1

      - name: Deploy to Elastic Beanstalk
        uses: aws-actions/aws-elasticbeanstalk-deploy@v1
        with:
          application-name: onyx
          environment-name: Onyx-env-v4
          aws-region: ap-southeast-1
          deployment-package-path: obj/Release/Package/ONYX_DDAC.zip
          version-label: onyx-${{ github.sha }}
          create-application-if-not-exists: false
          create-environment-if-not-exists: false
          create-s3-bucket-if-not-exists: false
          wait-for-deployment: true
          wait-for-environment-recovery: true
          deployment-timeout: 1800
